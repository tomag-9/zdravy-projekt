name: PR Title Lint

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, synchronize, reopened]

jobs:
  commitlint:
    name: Lint PR Title
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/config-conventional @commitlint/cli

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if echo "$PR_TITLE" | npx commitlint --config .commitlintrc.json; then
            echo "PR Title is valid."
            exit 0
          else
            echo "PR Title is invalid. Checking latest commit message as fallback..."
            # Fetch the latest commit message from the PR
            COMMIT_MSG=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[-1].messageHeadline')
            echo "Validating latest commit message: $COMMIT_MSG"
            echo "$COMMIT_MSG" | npx commitlint --config .commitlintrc.json
          fi

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const message = `## ❌ PR Title Validation Failed

            Your PR title does not follow the [Conventional Commits](https://www.conventionalcommits.org/) format.

            ### Expected format:
            \`\`\`
            <type>(<scope>): <subject>
            \`\`\`

            ### Examples:
            - \`feat(backend): add user authentication\`
            - \`fix(frontend): resolve button alignment\`
            - \`docs: update README\`

            ### Valid types:
            \`feat\`, \`fix\`, \`docs\`, \`style\`, \`refactor\`, \`test\`, \`chore\`, \`perf\`, \`ci\`, \`build\`, \`revert\`

            ### Valid scopes:
            \`backend\`, \`frontend\`, \`ci\`, \`docker\`, \`docs\`, \`auth\`, \`api\`, \`tests\`, \`config\`, \`deps\`

            Please update your PR title and refer to [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for detailed guidelines.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
