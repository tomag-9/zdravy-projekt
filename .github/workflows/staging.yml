name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: [self-hosted, builder]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Disable sparse checkout
        run: |
          git sparse-checkout disable || true
          git checkout .

      - name: Debug - show workspace structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Workspace: ${{ github.workspace }}"
          echo "Listing root:"
          ls -la
          echo "Backend directory:"
          ls -la backend/ || echo "backend/ not found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache,mode=max

  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, builder]
    needs: build-and-push
    environment:
      name: staging
      url: https://zp.tomag.xyz

    steps:
      - name: Checkout compose files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.staging.yml
          sparse-checkout-cone-mode: false

      - name: Setup Docker certificates
        run: |
          mkdir -p /home/runner/.docker
          echo "${{ secrets.STAGING_DOCKER_CA }}" | base64 -d > /home/runner/.docker/ca.pem
          echo "${{ secrets.STAGING_DOCKER_CERT }}" | base64 -d > /home/runner/.docker/cert.pem
          echo "${{ secrets.STAGING_DOCKER_KEY }}" | base64 -d > /home/runner/.docker/key.pem
          chmod 600 /home/runner/.docker/{ca,cert,key}.pem

      - name: Deploy via remote Docker context
        env:
          DOCKER_HOST: ${{ secrets.STAGING_DOCKER_HOST }}
          DOCKER_CERT_PATH: /home/runner/.docker
          DOCKER_TLS_VERIFY: "1"
          DJANGO_SETTINGS_MODULE: app.settings.staging
          DJANGO_SECRET_KEY: ${{ secrets.STAGING_DJANGO_SECRET_KEY }}
          POSTGRES_DB: ${{ secrets.STAGING_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.STAGING_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          POSTGRES_HOST: db
          POSTGRES_PORT: "5432"
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          FRONTEND_URL: https://${{ secrets.STAGING_HOST }}
          VITE_API_URL: https://${{ secrets.STAGING_HOST }}/api
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          EMAIL_HOST: ${{ secrets.STAGING_EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.STAGING_EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.STAGING_EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.STAGING_EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL: ${{ secrets.STAGING_DEFAULT_FROM_EMAIL }}
        run: |
          echo "🔄 Pulling latest images on staging server..."
          docker compose -f docker-compose.staging.yml pull

          echo "🚀 Starting services on staging server..."
          docker compose -f docker-compose.staging.yml up -d --remove-orphans

          echo "⏳ Waiting for backend to be healthy..."
          sleep 15

          echo "� Restarting nginx to pick up new upstream containers..."
          docker compose -f docker-compose.staging.yml restart nginx

          echo "�📊 Running database migrations..."
          BACKEND_CONTAINER=$(docker ps --filter "name=backend" --format "{{.ID}}" | head -1)
          if [ -z "$BACKEND_CONTAINER" ]; then
            echo "❌ Backend container not found!"
            docker ps
            exit 1
          fi

          docker exec $BACKEND_CONTAINER python manage.py migrate --noinput

          echo "✅ Deployment complete!"
          docker system prune -f
