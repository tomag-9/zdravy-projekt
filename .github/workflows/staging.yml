name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache,mode=max

  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, staging]
    needs: build-and-push
    environment:
      name: staging
      url: https://zb.tomag.xyz

    steps:
      - name: Pull and deploy prebuilt images
        working-directory: /opt/zdravy-projekt
        run: |
          echo "🔄 Pulling latest images from registry..."
          docker compose -f docker-compose.staging.yml pull

          echo "🚀 Starting services..."
          docker compose -f docker-compose.staging.yml up -d --remove-orphans

          echo "⏳ Waiting for services to be healthy..."
          sleep 10

  migrate:
    name: Run Database Migrations
    runs-on: [self-hosted, staging]
    needs: deploy-staging
    steps:
      - name: Run migrations and cleanup
        working-directory: /opt/zdravy-projekt
        run: |
          echo "📊 Running database migrations..."
          docker compose -f docker-compose.staging.yml exec -T backend python manage.py migrate --noinput
          
          echo "🗑️ Cleaning up old images..."
          docker system prune -f