name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: [self-hosted, builder]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Disable sparse checkout
        run: |
          git sparse-checkout disable || true
          git checkout .

      - name: Debug - show workspace structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Workspace: ${{ github.workspace }}"
          echo "Listing root:"
          ls -la
          echo "Backend directory:"
          ls -la backend/ || echo "backend/ not found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-cache,mode=max

  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, builder]
    needs: build-and-push
    environment:
      name: staging
      url: https://zp.tomag.xyz

    steps:
      - name: Checkout compose files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/swarm
          sparse-checkout-cone-mode: false

      - name: Setup Docker certificates
        run: |
          mkdir -p /home/runner/.docker
          echo "${{ secrets.STAGING_DOCKER_CA }}" | base64 -d > /home/runner/.docker/ca.pem
          echo "${{ secrets.STAGING_DOCKER_CERT }}" | base64 -d > /home/runner/.docker/cert.pem
          echo "${{ secrets.STAGING_DOCKER_KEY }}" | base64 -d > /home/runner/.docker/key.pem
          chmod 600 /home/runner/.docker/{ca,cert,key}.pem

      - name: Deploy stack to Swarm via remote Docker context
        env:
          DOCKER_HOST: ${{ secrets.STAGING_DOCKER_HOST }}
          DOCKER_CERT_PATH: /home/runner/.docker
          DOCKER_TLS_VERIFY: "1"
          REGISTRY_URL: ${{ secrets.REGISTRY_USERNAME }}
          APP_IMAGE_TAG: staging
          DJANGO_SETTINGS_MODULE: app.settings.staging
          APP_HOST: ${{ secrets.STAGING_HOST }}
          APP_HOST_WWW: ""
          TRAEFIK_DOCKER_NETWORK: ${{ secrets.STAGING_TRAEFIK_DOCKER_NETWORK || 'zdravy_public' }}
          LETSENCRYPT_EMAIL: ${{ secrets.STAGING_LETSENCRYPT_EMAIL || secrets.STAGING_EMAIL_HOST_USER }}
          # Use DNS challenge for staging (Cloudflare tunnel)
          ACME_DNS_CHALLENGE: "true"
          ACME_TLS_CHALLENGE: "false"
          ACME_DNS_PROVIDER: "cloudflare"
          CF_API_EMAIL: ${{ secrets.STAGING_CLOUDFLARE_EMAIL }}
          CF_DNS_API_TOKEN_FILE: "/run/secrets/cloudflare_api_token"
          POSTGRES_DB: ${{ secrets.STAGING_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.STAGING_POSTGRES_USER }}
          POSTGRES_HOST: ${{ secrets.STAGING_POSTGRES_HOST || 'db' }}
          POSTGRES_PORT: "5432"
          EMAIL_HOST: ${{ secrets.STAGING_EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.STAGING_EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.STAGING_EMAIL_HOST_USER }}
          DEFAULT_FROM_EMAIL: ${{ secrets.STAGING_DEFAULT_FROM_EMAIL }}
          SECRET_DJANGO_SECRET_KEY: ${{ secrets.STAGING_DJANGO_SECRET_KEY }}
          SECRET_POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          SECRET_EMAIL_HOST_PASSWORD: ${{ secrets.STAGING_EMAIL_HOST_PASSWORD }}
          SECRET_SENTRY_DSN: ${{ secrets.STAGING_SENTRY_DSN }}
          SECRET_CLOUDFLARE_API_TOKEN: ${{ secrets.STAGING_CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          echo "🔎 Checking Docker Swarm status..."
          SWARM_STATE=$(docker info --format '{{.Swarm.LocalNodeState}}')
          if [ "$SWARM_STATE" != "active" ]; then
            echo "❌ Remote Docker is not in Swarm mode (state: $SWARM_STATE)."
            exit 1
          fi

          echo "🌐 Ensuring public overlay network exists..."
          docker network inspect "$TRAEFIK_DOCKER_NETWORK" >/dev/null 2>&1 || \
            docker network create --driver overlay --attachable "$TRAEFIK_DOCKER_NETWORK"

          echo "🔐 Creating/updating Docker secrets from GitHub Secrets..."
          create_or_update_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "❌ Required secret '$name' is empty"
              exit 1
            fi

            if docker secret inspect "$name" >/dev/null 2>&1; then
              docker secret rm "$name" >/dev/null 2>&1 || true
            fi
            printf '%s' "$value" | docker secret create "$name" - >/dev/null
          }

          create_or_update_secret "django_secret_key" "$SECRET_DJANGO_SECRET_KEY"
          create_or_update_secret "postgres_password" "$SECRET_POSTGRES_PASSWORD"
          create_or_update_secret "email_host_password" "$SECRET_EMAIL_HOST_PASSWORD"
          create_or_update_secret "sentry_dsn" "$SECRET_SENTRY_DSN"
          create_or_update_secret "cloudflare_api_token" "$SECRET_CLOUDFLARE_API_TOKEN"

          echo "🚀 Deploying stack..."
          docker stack deploy -c deploy/swarm/stack.yml zdravy

          echo "⏳ Waiting for backend to be healthy..."
          BACKEND_HEALTHY=false
          for i in $(seq 1 24); do
            BACKEND_CONTAINER=$(docker ps \
              --filter "label=com.docker.swarm.service.name=zdravy_backend" \
              --format "{{.ID}}" | head -1)
            if [ -n "$BACKEND_CONTAINER" ]; then
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$BACKEND_CONTAINER" 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Backend is healthy after $((i * 5))s"
                BACKEND_HEALTHY=true
                break
              fi
            fi
            echo "  ⏳ Still waiting... ($((i * 5))s)"
            sleep 5
          done
          if [ "$BACKEND_HEALTHY" != "true" ]; then
            echo "❌ Backend failed to become healthy after 120s"
            docker service ps zdravy_backend --no-trunc
            docker service logs --tail=100 zdravy_backend || true
            exit 1
          fi

          echo "📊 Running database migrations..."
          BACKEND_CONTAINER=$(docker ps \
            --filter "label=com.docker.swarm.service.name=zdravy_backend" \
            --format "{{.ID}}" | head -1)
          if [ -z "$BACKEND_CONTAINER" ]; then
            echo "❌ Backend container not found!"
            docker ps
            exit 1
          fi

          docker exec "$BACKEND_CONTAINER" python manage.py migrate --noinput

          echo "✅ Deployment complete!"
          docker system prune -f
