name: Build Staging Images

on:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: staging-images
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:staging-${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.STAGING_VITE_API_URL || '/api' }}
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:staging-${{ github.sha }}

      - name: Print rollback tags
        run: |
          echo "Backend rollback tag: staging-${{ github.sha }}"
          echo "Frontend rollback tag: staging-${{ github.sha }}"
