name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ secrets.REGISTRY_URL != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ secrets.REGISTRY_URL != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:staging
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:staging-cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:staging
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:staging-cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:staging-cache,mode=max

  deploy-staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.STAGING_HOST != '' && secrets.STAGING_SSH_KEY != '' }}
    environment:
      name: staging
      url: https://${{ secrets.STAGING_HOST }}

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/zdravy-projekt
            echo "🔄 Pulling latest images..."
            docker compose -f docker-compose.staging.yml pull
            
            echo "🚀 Starting services..."
            docker compose -f docker-compose.staging.yml up -d
            
            echo "⏳ Waiting for services to be healthy..."
            sleep 10

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: !cancelled() && secrets.STAGING_HOST != ''

    steps:
      - name: Run migrations on staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/zdravy-projekt
            echo "📊 Running database migrations..."
            docker compose -f docker-compose.staging.yml exec -T backend python manage.py migrate --noinput
            
            echo "🗑️ Cleaning up old images..."
            docker system prune -f

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: migrate
    if: !cancelled() && secrets.STAGING_HOST != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        env:
          BASE_URL: https://${{ secrets.STAGING_HOST }}
        run: |
          # Create basic smoke test
          cat > e2e-smoke.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';
          
          test('homepage loads', async ({ page }) => {
            await page.goto(process.env.BASE_URL || 'http://localhost');
            await expect(page).toHaveTitle(/Zdravy Projekt/i);
          });
          
          test('API health check', async ({ request }) => {
            const response = await request.get(`${process.env.BASE_URL}/api/health/`);
            expect(response.ok()).toBeTruthy();
          });
          EOF
          
          npx playwright test e2e-smoke.spec.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, migrate, e2e-tests]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
            echo "🌐 Environment: https://${{ secrets.STAGING_HOST }}"
          else
            echo "❌ Staging deployment failed or has issues"
            exit 1
          fi
