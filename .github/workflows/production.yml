name: Deploy to Production

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: [self-hosted, builder]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:latest
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:latest
            ${{ secrets.REGISTRY_URL }}/zdravy-projekt-frontend:${{ github.sha }}

  deploy-production:
    name: Manual Deploy to Production
    runs-on: [self-hosted, production]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://${{ secrets.PROD_HOST }}

    steps:
      - name: Deploy selected version
        working-directory: /opt/zdravy-projekt
        env:
          TAG: ${{ inputs.image_tag }}
        run: |
          echo "🚀 Deploying image tag: $TAG"

          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
