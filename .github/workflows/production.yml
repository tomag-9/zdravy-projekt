name: Build Production Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-images
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Production Images
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:prod
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-backend:prod-${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PROD_VITE_API_URL || '/api' }}
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:prod
            ${{ secrets.REGISTRY_USERNAME }}/zdravy-projekt-frontend:prod-${{ github.sha }}

      - name: Print rollback tags
        run: |
          echo "Backend rollback tag: prod-${{ github.sha }}"
          echo "Frontend rollback tag: prod-${{ github.sha }}"
