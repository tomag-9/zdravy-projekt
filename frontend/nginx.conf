server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml application/json application/javascript text/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Dedicated health endpoint for reverse-proxy/container probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Keep legacy browser /favicon.ico requests from returning 404.
    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    # Service worker must not be immutable-cached, otherwise clients can keep
    # using an outdated worker for too long and miss installability/UI fixes.
    location = /sw.js {
        try_files /sw.js =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Keep manifest fresh as browser installability checks depend on it.
    location = /manifest.json {
        try_files /manifest.json =404;
        add_header Cache-Control "no-cache" always;
        expires -1;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker and manifest must never be cached long-term
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
