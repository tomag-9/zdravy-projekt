server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml application/json application/javascript text/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Dedicated health endpoint for reverse-proxy/container probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Keep legacy browser /favicon.ico requests on the current brand icon.
    location = /favicon.ico {
        return 302 /icons/icon-192.png;
    }

    # Keep SW and manifest fresh; long immutable caching can block
    # installability updates on mobile browsers.
    location = /sw.js {
        try_files /sw.js =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires -1;
    }

    location = /manifest.json {
        try_files /manifest.json =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Do not serve the SPA shell for common secret/config scanner probes.
    location ~ /\.(?!well-known(?:/|$)) {
        access_log off;
        return 404;
    }

    location ~* ^/(config|settings|env)\.(json|js)$ {
        access_log off;
        return 404;
    }

    location ~* ^/js/(config|settings|env)\.js$ {
        access_log off;
        return 404;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
