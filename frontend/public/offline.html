<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ste offline – Zdravý Projekt</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f8fafc;
        color: #1e293b;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; }
      p { color: #64748b; max-width: 340px; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <h1>Ste offline</h1>
    <p>
      Nemáte pripojenie na internet. Skontrolujte pripojenie a skúste to znova.
    </p>
    <button onclick="window.location.reload()">Skúsiť znova</button>
  </body>
</html>
