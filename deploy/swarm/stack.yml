services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - app
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.05"
          memory: 32M
        limits:
          cpus: "0.25"
          memory: 128M

  frontend:
    image: ${REGISTRY_URL}/zdravy-projekt-frontend:${APP_IMAGE_TAG:-latest}
    networks:
      - app
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      rollback_config:
        order: stop-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.10"
          memory: 64M
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: ${REGISTRY_URL}/zdravy-projekt-backend:${APP_IMAGE_TAG:-latest}
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-app.settings.prod}
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PROD_HOST: ${APP_HOST}
      PROD_HOST_WWW: ${APP_HOST_WWW:-}
      STAGING_HOST: ${APP_HOST}
      FRONTEND_URL: https://${APP_HOST}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD_FILE: /run/secrets/email_host_password
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
      SENTRY_DSN_FILE: /run/secrets/sentry_dsn
    secrets:
      - django_secret_key
      - postgres_password
      - email_host_password
      - sentry_dsn
    networks:
      - app
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        delay: 15s
      rollback_config:
        order: stop-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M
        limits:
          cpus: "1.00"
          memory: 1024M
      labels:
        - logging.job=backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.05"
          memory: 64M
        limits:
          cpus: "0.50"
          memory: 256M
      labels:
        - logging.job=redis

  celery:
    image: ${REGISTRY_URL}/zdravy-projekt-backend:${APP_IMAGE_TAG:-latest}
    command: sh -c "echo 'Waiting for Redis...' && until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null; do echo 'Redis not ready, retrying in 2s...'; sleep 2; done && echo 'Redis is up!' && celery -A app worker -l info"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-app.settings.prod}
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD_FILE: /run/secrets/email_host_password
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SENTRY_DSN_FILE: /run/secrets/sentry_dsn
    secrets:
      - django_secret_key
      - postgres_password
      - email_host_password
      - sentry_dsn
    networks:
      - app
      - observability
    healthcheck:
      disable: true
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 15s
      rollback_config:
        order: stop-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.20"
          memory: 256M
        limits:
          cpus: "1.00"
          memory: 768M
      labels:
        - logging.job=celery

  celery-beat:
    image: ${REGISTRY_URL}/zdravy-projekt-backend:${APP_IMAGE_TAG:-latest}
    command: sh -c "echo 'Waiting for Redis...' && until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null; do echo 'Redis not ready, retrying in 2s...'; sleep 2; done && echo 'Redis is up!' && celery -A app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-app.settings.prod}
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SENTRY_DSN_FILE: /run/secrets/sentry_dsn
    secrets:
      - django_secret_key
      - postgres_password
      - sentry_dsn
    networks:
      - app
      - observability
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.10"
          memory: 128M
        limits:
          cpus: "0.50"
          memory: 384M
      labels:
        - logging.job=celery-beat

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    networks:
      - observability
      - app
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.10"
          memory: 128M
        limits:
          cpus: "0.75"
          memory: 768M
      labels:
        - logging.job=prometheus

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    configs:
      - source: loki_config
        target: /etc/loki/loki-config.yml
    volumes:
      - loki_data:/loki
    networks:
      - observability
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.10"
          memory: 128M
        limits:
          cpus: "0.75"
          memory: 768M
      labels:
        - logging.job=loki

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    configs:
      - source: promtail_config
        target: /etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/tmp
    networks:
      - observability
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          cpus: "0.02"
          memory: 64M
        limits:
          cpus: "0.20"
          memory: 256M

configs:
  nginx_config:
    name: zdravy_nginx_config_${STACK_CONFIG_VERSION:-latest}
    file: ./nginx/nginx.conf
  prometheus_config:
    name: zdravy_prometheus_config_${STACK_CONFIG_VERSION:-latest}
    file: ./prometheus/prometheus.yml
  loki_config:
    name: zdravy_loki_config_${STACK_CONFIG_VERSION:-latest}
    file: ./loki/loki-config.yml
  promtail_config:
    name: zdravy_promtail_config_${STACK_CONFIG_VERSION:-latest}
    file: ./promtail/promtail-config.yml

secrets:
  django_secret_key:
    external: true
  postgres_password:
    external: true
  email_host_password:
    external: true
  sentry_dsn:
    external: true

volumes:
  redis_data:
  prometheus_data:
  loki_data:
  promtail_positions:

networks:
  app:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1400
  observability:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1400
