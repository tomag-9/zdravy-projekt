</head><body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Card } = window.ZdravProjektDesignSystem_970737;
  const { useState } = React;
  const TABS = [{ id: "single", label: "+ Pridať deň" }, { id: "range", label: "+ Pridať úsek dní" }];
  function Demo() {
    const [t, setT] = useState("single");
    return (
      <Card pad={false}>
        <Tabs tabs={TABS} active={t} onChange={setT} />
        <div className="panel">{t === "single" ? "Formulár pre jeden deň" : "Formulár pre úsek dní (od – do)"}</div>
      </Card>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
