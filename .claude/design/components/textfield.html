<!doctype html>
<!-- @dsCard group="Components" name="TextField" subtitle="React · input / textarea / select · brand focus ring" viewport="720x300" -->
<html lang="sk"><head><meta charset="utf-8"><title>TextField</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { TextField } = window.ZdravProjektDesignSystem_970737;
  const { useState } = React;
  function Demo() {
    const [email, setEmail] = useState("janka@zdravyprojekt.sk");
    const [diet, setDiet] = useState("VEGE");
    const [note, setNote] = useState("");
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, maxWidth: 640 }}>
        <TextField label="E-mail" required value={email} onChange={(e) => setEmail(e.target.value)} />
        <TextField label="Diéta" options={["KLASIK", "VEGE", "NO MILK", "NO GLUTEN"]} value={diet} onChange={(e) => setDiet(e.target.value)} />
        <div style={{ gridColumn: "1 / -1" }}>
          <TextField label="Poznámka" hint="(nepovinné)" multiline placeholder="Napíšte poznámku k objednávke…" value={note} onChange={(e) => setNote(e.target.value)} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
