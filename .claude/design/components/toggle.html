<html lang="sk"><head><meta charset="utf-8"><title>Toggle</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:22px;box-sizing:border-box;font-family:var(--font-sans)}.row{display:flex;align-items:center;gap:14px;margin-bottom:14px;font-family:var(--font-display);font-weight:600;color:var(--green-900);font-size:14px}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { Toggle } = window.ZdravProjektDesignSystem_970737;
  const { useState } = React;
  function Demo() {
    const [a, setA] = useState(true);
    const [b, setB] = useState(false);
    return (
      <>
        <div className="row"><Toggle on={a} onChange={setA} /> EduPage automatika {a ? "zapnutá" : "vypnutá"}</div>
        <div className="row"><Toggle on={b} onChange={setB} /> Uzávierka deň vopred</div>
        <div className="row"><Toggle on={false} disabled /> Neaktívny prepínač</div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
