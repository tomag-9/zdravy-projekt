<!doctype html>
<!-- @dsCard group="UI Kit — Client App" name="Klientska aplikácia — PC (desktop)" subtitle="Desktop prototype: ľavá navigácia (Jedálniček · Domov · Nová objednávka), Nastavenia vpravo hore. Login → Domov → Objednávka → Potvrdenie, Jedálniček, Nastavenia." viewport="1440x960" -->
<html lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zdravý projekt — klientská aplikácia (PC)</title>

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="pc.css">
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="LoginPC.jsx"></script>
    <script type="text/babel" src="HomePC.jsx"></script>
    <script type="text/babel" src="MenuPC.jsx"></script>
    <script type="text/babel" src="OrderPC.jsx"></script>
    <script type="text/babel" src="OrderDetailPC.jsx"></script>
    <script type="text/babel" src="SuccessPC.jsx"></script>
    <script type="text/babel" src="SettingsPC.jsx"></script>

    <script type="text/babel" data-presets="react">
        const { Home: NHome, Book: NBook, Plus: NPlus, Settings: NSettings, Bell: NBell, LogOut: NLogOut } = window.ZpIcons;

        const TITLES = {
            home:     { eye: "Utorok · 27. máj 2026", h1: "Dobré ráno, Janka" },
            menu:     { eye: "Týždeň 26. – 30. mája 2026", h1: "Jedálniček" },
            order:    { eye: "Plánovanie objednávky", h1: "Nová objednávka" },
            detail:   { eye: "Prehľad objednávky", h1: "Detail objednávky" },
            success:  { eye: "Hotovo", h1: "Objednávka odoslaná" },
            settings: { eye: "Účet a stravovanie", h1: "Nastavenia" },
        };

        // Left rail order per request: Domov · Nová objednávka · Jedálniček · Nastavenia
        const NAV = [
            { k: "home",     l: "Domov",           icon: <NHome /> },
            { k: "order",    l: "Nová objednávka", icon: <NPlus />, cta: true },
            { k: "menu",     l: "Jedálniček",      icon: <NBook /> },
            { k: "settings", l: "Nastavenia",      icon: <NSettings /> },
        ];

        function Shell({ route, navigate, params, children }) {
            const t = TITLES[route] || TITLES.home;
            // Keep the right rail item highlighted across its sub-flow
            let activeKey = route;
            if (route === "success") activeKey = "order";
            else if (route === "detail") activeKey = "home";

            return (
                <div className="pc-app">
                    <aside className="pc-side">
                        <div className="pc-side-logo">
                            <img src="logo-zdravy-projekt.png" alt="Zdravý projekt" />
                        </div>
                        <div className="pc-nav-label">Navigácia</div>
                        <nav className="pc-nav">
                            {NAV.map((n) => (
                                <button
                                    key={n.k}
                                    className={"pc-navbtn" + (n.cta ? " pc-navbtn--cta" : "") + (activeKey === n.k ? " active" : "")}
                                    onClick={() => navigate(n.k, n.k === "order" ? { day: "streda, 28. mája" } : {})}
                                >
                                    {n.icon}<span>{n.l}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="pc-side-spacer"></div>
                        <button
                            className="pc-side-foot"
                            style={{ background: "transparent", border: 0, cursor: "pointer", width: "100%", textAlign: "left" }}
                            onClick={() => navigate("settings", { tab: "account" })}
                        >
                            <span className="av">JL</span>
                            <span className="who">
                                <span className="n">Janka Lúková</span>
                                <span className="o">Materská škola Lúka</span>
                            </span>
                        </button>
                    </aside>

                    <main className="pc-main">
                        <header className="pc-topbar">
                            <div className="crumb">
                                <div className="eye">{t.eye}</div>
                                <h1>{t.h1}</h1>
                            </div>
                            <div className="pc-topbar-actions">
                                <button className="pc-iconbtn" aria-label="Upozornenia">
                                    <NBell /><span className="dot"></span>
                                </button>
                                <button
                                    className="pc-iconbtn"
                                    aria-label="Odhlásiť sa"
                                    title="Odhlásiť sa"
                                    onClick={() => navigate("login")}
                                >
                                    <NLogOut />
                                </button>
                            </div>
                        </header>
                        <div className="pc-scroll" key={route}>
                            {children}
                        </div>
                    </main>
                </div>
            );
        }

        function Root() {
            const [route, setRoute] = React.useState("login");
            const [params, setParams] = React.useState({});

            function navigate(name, p = {}) {
                setParams(p);
                setRoute(name);
                const sc = document.querySelector(".pc-scroll");
                if (sc) sc.scrollTop = 0;
            }

            React.useEffect(() => { window.__nav = navigate; }, []);

            if (route === "login") {
                return <window.LoginPC onLogin={() => navigate("home")} />;
            }

            let screen = null;
            if (route === "home") screen = <window.HomePC navigate={navigate} />;
            else if (route === "menu") screen = <window.MenuPC navigate={navigate} />;
            else if (route === "order") screen = <window.OrderPC navigate={navigate} params={params} />;
            else if (route === "detail") screen = <window.OrderDetailPC navigate={navigate} params={params} />;
            else if (route === "success") screen = <window.SuccessPC navigate={navigate} params={params} />;
            else if (route === "settings") screen = <window.SettingsPC navigate={navigate} params={params} />;

            return (
                <Shell route={route} navigate={navigate} params={params}>
                    {screen}
                </Shell>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
    </script>
</body>
</html>
