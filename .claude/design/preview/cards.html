<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Cream-soft on cream, no hard border" viewport="700x140" -->
<html lang="en"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:18px 22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
</head><body>
<div style="display:flex;gap:14px;">
  <div style="flex:1;background:var(--bg-cream-warm);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-sm);">
    <div style="font-family:var(--font-serif);font-size:20px;color:var(--green-900);margin-bottom:6px;line-height:1.1;">Škôlky a detské zariadenia</div>
    <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-2);line-height:1.5;">Kompletné denné stravovanie — desiata, obed aj olovrant.</div>
  </div>
  <div style="flex:1;background:var(--bg-cream-soft);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-sm);">
    <div style="font-family:var(--font-serif);font-size:20px;color:var(--green-900);margin-bottom:6px;line-height:1.1;">Rodiny a jednotlivci</div>
    <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-2);line-height:1.5;">Zdravé obedy a hotové jedlá pre celú rodinu.</div>
  </div>
</div>
</body></html>
