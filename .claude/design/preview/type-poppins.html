<!doctype html>
<!-- @dsCard group="Type" name="Buttons & UI — Poppins" subtitle="Geometric secondary sans for CTAs and chips" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons & UI — Poppins</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div style="font-family: var(--font-display); color: var(--green-800);">
  <div style="display: flex; gap: 8px; align-items: baseline;">
    <div style="font-size: 22px; font-weight: 600;">Objednať jedlo</div>
    <div style="font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); font-weight: 400;">Poppins 600 · 22</div>
  </div>
  <div style="display: flex; gap: 8px; align-items: baseline; margin-top: 10px;">
    <div style="font-size: 14px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--green-600);">PRE ŠKÔLKY</div>
    <div style="font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); font-weight: 400;">Poppins 600 · 14 caps · 0.16em (eyebrow)</div>
  </div>
  <div style="display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 6px 14px; background: var(--green-700); color: var(--bg-cream); border-radius: 999px; font-size: 14px; font-weight: 600;">Objednať teraz</div>
  <span style="font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); margin-left: 10px;">Poppins 600 in CTA</span>
</div>
</body></html>
