<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Uppercase Poppins labels · cream-warm field · focus ring" viewport="700x190" -->
<html lang="en"><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:18px 22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
</head><body>
<div style="display:flex;flex-direction:column;gap:10px;max-width:520px;">
  <label style="display:flex;flex-direction:column;gap:4px;font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--green-700);letter-spacing:0.08em;text-transform:uppercase;">
    E-mail
    <input value="janka@zdravyprojekt.sk" style="background:var(--bg-cream-warm);border:1.5px solid rgba(23,53,5,0.12);border-radius:14px;padding:11px 14px;font-family:var(--font-sans);font-size:14px;color:var(--green-900);outline:none;">
  </label>
  <label style="display:flex;flex-direction:column;gap:4px;font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--green-700);letter-spacing:0.08em;text-transform:uppercase;">
    Počet detí
    <input type="number" value="24" style="background:var(--bg-cream-warm);border:1.5px solid var(--green-600);border-radius:14px;padding:11px 14px;font-family:var(--font-sans);font-size:14px;color:var(--green-900);outline:none;box-shadow:0 0 0 4px rgba(114,136,75,0.14);">
  </label>
</div>
</body></html>
