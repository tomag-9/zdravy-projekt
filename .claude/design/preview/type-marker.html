<!doctype html>
<!-- @dsCard group="Type" name="Marker & Script" subtitle="Wordmark substitution flag — not the real logo font" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marker / Wordmark — substitution</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div style="display: flex; gap: 24px; align-items: center;">
  <div>
    <div style="font-family: var(--font-marker); font-size: 56px; color: var(--green-700); line-height: 1;">zdravý<br>projekt</div>
  </div>
  <div style="flex: 1;">
    <div style="font-family: var(--font-script); font-size: 32px; color: var(--coral-600); lineetransition: 1;">to najlepšie z nás</div>
    <div style="font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); margin-top: 8px; line-height: 1.5;">
      <strong>⚠ Substitute</strong> — Bagel Fat One + Caveat Brush (Google Fonts). The real wordmark is a proprietary brush face; only the raster is in <code>assets/brand-equation.png</code>.
    </div>
  </div>
</div>
</body></html>
