<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="4 → 999 (pill). Cards lean lg, buttons lean pill" viewport="700x140" -->
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:18px 22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
</head><body>
<div style="display:flex;gap:14px;align-items:flex-end;">
  <div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:4px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-xs</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">4px</div>
    </div><div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:8px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-sm</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">8px</div>
    </div><div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:14px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-md</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">14px</div>
    </div><div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:22px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-lg</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">22px</div>
    </div><div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:32px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-xl</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">32px</div>
    </div><div style="text-align:center;">
      <div style="width:72px;height:72px;background:var(--peach-400);border-radius:999px;box-shadow:var(--shadow-sm);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:8px;font-family:var(--font-display);font-weight:600;">--radius-pill</div>
      <div style="font-size:11px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;">999px</div>
    </div>
</div>
</body></html>
