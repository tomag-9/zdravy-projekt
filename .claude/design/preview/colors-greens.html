<!doctype html>
<!-- @dsCard group="Colors" name="Greens" subtitle="Olive · sage · leaf — the spine of the palette" viewport="700x110" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Greens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div class="row">
  
<div class="swatch">
  <div class="chip" style="background: #173505"></div>
  <div class="meta">
    <div class="name">green-900</div>
    <div class="hex">#173505</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #2A3315"></div>
  <div class="meta">
    <div class="name">green-800</div>
    <div class="hex">#2A3315</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #425422"></div>
  <div class="meta">
    <div class="name">green-700</div>
    <div class="hex">#425422</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #72884B"></div>
  <div class="meta">
    <div class="name">green-600</div>
    <div class="hex">#72884B</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #7C9853"></div>
  <div class="meta">
    <div class="name">green-500</div>
    <div class="hex">#7C9853</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #96AE6D"></div>
  <div class="meta">
    <div class="name">green-400</div>
    <div class="hex">#96AE6D</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #4FA22F"></div>
