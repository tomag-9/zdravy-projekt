<!doctype html>
<!-- @dsCard group="Colors" name="Coral & Teal" subtitle="The one hot accent + the seal teal" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Coral & Teal</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div class="row">
  
<div class="swatch">
  <div class="chip" style="background: #E17D95"></div>
  <div class="meta">
    <div class="name">coral-400</div>
    <div class="hex">#E17D95</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #C92E52"></div>
  <div class="meta">
    <div class="name">coral-600</div>
    <div class="hex">#C92E52</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #D52E4E"></div>
  <div class="meta">
    <div class="name">coral-logo</div>
    <div class="hex">#D52E4E</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #0097A7"></div>
  <div class="meta">
    <div class="name">teal-500</div>
    <div class="hex">#0097A7</div>
  </div>
</div>
</div>
<div style="margin-top: 14px; font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); line-height: 1.5;">
  Coral is the brand's <strong style="color: var(--coral-600)">one hot accent</strong> — hearts, CTAs, the "Zdravé Brušká" mark. Never body text. Teal is for badges & seals only.
</div>
</body></html>
