<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows" subtitle="Olive-cast soft shadows — never pure black" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8"><title>Shadows (olive-cast)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:18px 22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
</head><body>
<div style="display:flex;gap:20px;align-items:flex-end;padding:20px 0;">
  
    <div style="text-align:center;">
      <div style="width:82px;height:82px;background:var(--bg-cream-warm);border-radius:var(--radius-lg);box-shadow:0 1px 2px rgba(23,53,5,0.06);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:10px;font-family:var(--font-display);font-weight:600;">--shadow-xs</div>
    </div>
  
    <div style="text-align:center;">
      <div style="width:82px;height:82px;background:var(--bg-cream-warm);border-radius:var(--radius-lg);box-shadow:0 2px 8px rgba(23,53,5,0.06), 0 1px 2px rgba(23,53,5,0.04);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:10px;font-family:var(--font-display);font-weight:600;">--shadow-sm</div>
    </div>
  
    <div style="text-align:center;">
      <div style="width:82px;height:82px;background:var(--bg-cream-warm);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(23,53,5,0.08), 0 2px 6px rgba(23,53,5,0.04);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:10px;font-family:var(--font-display);font-weight:600;">--shadow-md</div>
    </div>
  
    <div style="text-align:center;">
      <div style="width:82px;height:82px;background:var(--bg-cream-warm);border-radius:var(--radius-lg);box-shadow:0 24px 60px rgba(23,53,5,0.14), 0 6px 18px rgba(23,53,5,0.06);"></div>
      <div style="font-size:11px;color:var(--ink-2);margin-top:10px;font-family:var(--font-display);font-weight:600;">--shadow-lg</div>
    </div>
  
</div>
</body></html>
