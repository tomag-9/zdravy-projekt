<!doctype html>
<!-- @dsCard group="Colors" name="Creams" subtitle="Cream parchment surfaces — the brand 'white'" viewport="700x110" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Creams</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div class="row">
  
<div class="swatch">
  <div class="chip" style="background: #FBF7E4; box-shadow: inset 0 0 0 1px rgba(23,53,5,0.08)"></div>
  <div class="meta">
    <div class="name">bg-cream</div>
    <div class="hex">#FBF7E4</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #F5F1CD"></div>
  <div class="meta">
    <div class="name">bg-cream-soft</div>
    <div class="hex">#F5F1CD</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #FEF9F1; box-shadow: inset 0 0 0 1px rgba(23,53,5,0.08)"></div>
  <div class="meta">
    <div class="name">bg-cream-warm</div>
    <div class="hex">#FEF9F1</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #F9F8E5"></div>
  <div class="meta">
    <div class="name">bg-paper</div>
    <div class="hex">#F9F8E5</div>
  </div>
</div>
  
<div class="swatch">
  <div class="chip" style="background: #FFFFFF; box-shadow: inset 0 0 0 1px rgba(23,53,5,0.16)"></div>
  <div class="meta">
    <div class="name">bg-white</div>
    <div class="hex">#FFFFFF</div>
  </div>
</div>
</div>
</body></html>
