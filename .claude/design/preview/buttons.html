<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · secondary · ghost · destructive" viewport="700x140" -->
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0}body{background:var(--bg-cream);padding:18px 22px;box-sizing:border-box;font-family:var(--font-sans)}</style>
</head><body>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
  <button style="background:var(--green-700);color:var(--bg-cream);border:none;border-radius:999px;padding:11px 22px;font-family:var(--font-display);font-weight:600;font-size:14px;box-shadow:var(--shadow-sm);cursor:pointer;">Objednať jedlo</button>
  <button style="background:var(--bg-cream-soft);color:var(--green-700);border:none;border-radius:999px;padding:11px 22px;font-family:var(--font-display);font-weight:600;font-size:14px;cursor:pointer;">Zistiť viac</button>
  <button style="background:transparent;color:var(--green-700);border:none;padding:11px 4px;font-family:var(--font-display);font-weight:600;font-size:14px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--peach-500);text-decoration-thickness:2px;text-underline-offset:3px;">O nás →</button>
  <button style="background:var(--coral-600);color:#fff;border:none;border-radius:999px;padding:11px 22px;font-family:var(--font-display);font-weight:600;font-size:14px;box-shadow:var(--shadow-sm);cursor:pointer;">Zrušiť odber</button>
</div>
<div style="margin-top:12px;display:flex;gap:10px;">
  <button style="background:var(--green-700);color:var(--bg-cream);border:none;border-radius:14px;padding:8px 16px;font-family:var(--font-display);font-weight:600;font-size:13px;cursor:pointer;">md radius</button>
  <button style="background:var(--green-700);color:var(--bg-cream);border:none;border-radius:14px;padding:14px 28px;font-family:var(--font-display);font-weight:600;font-size:16px;cursor:pointer;">large</button>
  <button style="background:var(--green-700);color:var(--bg-cream);border:none;border-radius:50%;width:40px;height:40px;font-family:var(--font-display);font-weight:600;font-size:16px;cursor:pointer;">+</button>
</div>
</body></html>
