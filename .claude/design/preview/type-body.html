<!doctype html>
<!-- @dsCard group="Type" name="Body — Mulish" subtitle="Default body sans — 400/700" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Body — Mulish sans</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-cream); padding: 18px 22px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { display: flex; flex-direction: column; flex: 1; min-width: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .swatch .chip { height: 56px; }
  .swatch .meta { background: var(--bg-cream-warm); padding: 8px 10px; }
  .swatch .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--green-900); }
  .swatch .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>

<div style="font-family: var(--font-sans); color: var(--ink-1);">
  <div style="font-size: 18px; line-height: 1.5; max-width: 60ch;">Vytvárame chutné, vyvážené a nutrične hodnotné jedlá, ktoré podporujú zdravie, rast a pohodu detí aj dospelých.</div>
  <div style="font-size: 11px; color: var(--ink-3); margin-top: 6px;">Mulish 400 · 18 / 1.5 · lede</div>
  <div style="font-size: 14px; line-height: 1.6; margin-top: 14px; max-width: 60ch;"><strong style="font-weight: 700;">Mulish 700</strong> for emphasis. Default body sits at 16 / 1.6 with text-wrap: pretty.</div>
  <div style="font-size: 11px; color: var(--ink-3); margin-top: 4px;">Mulish 400/700 · 14 / 1.6</div>
</div>
</body></html>
