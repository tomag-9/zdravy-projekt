<!doctype html>
<!-- @dsCard group="UI Kit — Website" name="Website UI kit" subtitle="Full marketing site recreation — hero, audiences, diets, founders, partners, footer" viewport="1280x1200" -->
<html lang="sk">
<head>
<meta charset="utf-8">
<title>Zdravý projekt — Marketing site recreation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
    html, body { margin: 0; padding: 0; background: var(--bg-cream); }
    body { color: var(--green-900); font-family: var(--font-sans); }
    /* Smooth between-section transitions */
    section { scroll-margin-top: 80px; }
    /* Decorative noise on hero */
    .noise { position: relative; }
    .noise::before {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background-image: radial-gradient(rgba(23,53,5,0.04) 1px, transparent 1px);
        background-size: 6px 6px;
        z-index: 0;
    }
    .noise > * { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Audiences.jsx"></script>
<script type="text/babel" src="DietPicker.jsx"></script>
<script type="text/babel" src="Founders.jsx"></script>
<script type="text/babel" src="Partners.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
    return (
        <div data-screen-label="Marketing homepage">
            <Header />
            <main className="noise">
                <Hero />
                <Audiences />
                <DietPicker />
                <Founders />
                <Partners />
            </main>
            <Footer />
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
