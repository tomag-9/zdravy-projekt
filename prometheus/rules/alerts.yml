# Prometheus alerting rules for Zdravy Projekt
groups:
  - name: django_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m]) 
          / 
          rate(django_http_responses_total_by_status_view_method_total[5m]) 
          > 0.05
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High HTTP 5xx error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.view }} (threshold: 5%)"

      # Very high error rate (critical)
      - alert: CriticalErrorRate
        expr: |
          rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m]) 
          / 
          rate(django_http_responses_total_by_status_view_method_total[5m]) 
          > 0.20
        for: 2m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Critical HTTP 5xx error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.view }} (threshold: 20%)"

      # Slow response times
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, 
            rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])
          ) > 2
        for: 10m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "Slow API response times detected"
          description: "P95 response time is {{ $value }}s for {{ $labels.view }} (threshold: 2s)"

      # Very slow response times
      - alert: VerySlowResponseTime
        expr: |
          histogram_quantile(0.95, 
            rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])
          ) > 5
        for: 5m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Very slow API response times detected"
          description: "P95 response time is {{ $value }}s for {{ $labels.view }} (threshold: 5s)"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: django_db_connections_total >= 45
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool near limit"
          description: "Database has {{ $value }} active connections (limit: 50)"

      # High request rate
      - alert: HighRequestRate
        expr: rate(django_http_requests_total_by_view_transport_method_total[5m]) > 100
        for: 10m
        labels:
          severity: info
          component: backend
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value }} req/s for {{ $labels.view }}"

  - name: celery_alerts
    interval: 30s
    rules:
      # Celery tasks failing
      - alert: CeleryTaskFailureRate
        expr: |
          rate(django_celery_task_status_total{status="failure"}[10m]) 
          / 
          rate(django_celery_task_status_total[10m]) 
          > 0.10
        for: 5m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "High Celery task failure rate"
          description: "Task failure rate is {{ $value | humanizePercentage }} for {{ $labels.task_name }} (threshold: 10%)"

      # Celery queue backlog
      - alert: CeleryQueueBacklog
        expr: django_celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Celery queue has large backlog"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks (threshold: 100)"

      # Celery worker down
      - alert: CeleryWorkerDown
        expr: django_celery_active_workers < 1
        for: 2m
        labels:
          severity: critical
          component: celery
        annotations:
          summary: "No active Celery workers"
          description: "Celery has {{ $value }} active workers (expected: >= 1)"

  - name: cache_alerts
    interval: 30s
    rules:
      # Low cache hit rate
      - alert: LowCacheHitRate
        expr: |
          rate(django_cache_get_hits_total[5m]) 
          / 
          (rate(django_cache_get_hits_total[5m]) + rate(django_cache_get_misses_total[5m])) 
          < 0.70
        for: 15m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate detected"
          description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 70%)"

  - name: system_alerts
    interval: 30s
    rules:
      # Django application down
      - alert: DjangoApplicationDown
        expr: up{job="django"} == 0
        for: 1m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Django application is down"
          description: "Django backend at {{ $labels.instance }} is not responding to health checks"

      # Prometheus scrape failures
      - alert: PrometheusScrapeFailure
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "Prometheus scrape failure"
          description: "Prometheus cannot scrape {{ $labels.job }} at {{ $labels.instance }}"
