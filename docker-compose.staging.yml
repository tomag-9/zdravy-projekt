services:
  backend:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:staging
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      STAGING_HOST: ${STAGING_HOST}
      FRONTEND_URL: ${FRONTEND_URL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD_FILE: /run/secrets/email_host_password
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
    secrets:
      - django_secret_key
      - postgres_password
      - email_host_password
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:staging
    command: sh -c "echo 'Waiting for Redis...' && until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null; do echo 'Redis not ready, retrying in 2s...'; sleep 2; done && echo 'Redis is up!' && celery -A app worker -l info"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD_FILE: /run/secrets/email_host_password
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
    secrets:
      - django_secret_key
      - postgres_password
      - email_host_password
    networks:
      - app
    healthcheck:
      disable: true
    restart: unless-stopped

  celery-beat:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:staging
    command: sh -c "echo 'Waiting for Redis...' && until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null; do echo 'Redis not ready, retrying in 2s...'; sleep 2; done && echo 'Redis is up!' && celery -A app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD_FILE: /run/secrets/email_host_password
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    secrets:
      - django_secret_key
      - postgres_password
      - email_host_password
    networks:
      - app
    healthcheck:
      disable: true
    restart: unless-stopped

  frontend:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-frontend:staging
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app
    restart: always

configs:
  nginx_config:
    content: |
      server {
          listen 80;
          server_name zp.tomag.xyz;

          # Docker's internal DNS resolver with 5s TTL so nginx re-resolves
          # container IPs after every restart instead of caching them at startup.
          resolver 127.0.0.11 valid=5s ipv6=off;

          real_ip_header CF-Connecting-IP;
          set_real_ip_from 103.21.244.0/22;
          set_real_ip_from 103.22.200.0/22;
          set_real_ip_from 103.31.4.0/22;
          set_real_ip_from 104.16.0.0/13;
          set_real_ip_from 104.24.0.0/14;
          set_real_ip_from 108.162.192.0/18;
          set_real_ip_from 131.0.72.0/22;
          set_real_ip_from 141.101.64.0/18;
          set_real_ip_from 162.158.0.0/15;
          set_real_ip_from 172.64.0.0/13;
          set_real_ip_from 173.245.48.0/20;
          set_real_ip_from 188.114.96.0/20;
          set_real_ip_from 190.93.240.0/20;
          set_real_ip_from 197.234.240.0/22;
          set_real_ip_from 198.41.128.0/17;

          client_max_body_size 10M;

          # Variables force nginx to use the resolver on each request cycle
          set $$upstream_backend "http://backend:8000";
          set $$upstream_frontend "http://frontend:80";

          location /api/ {
              proxy_pass $$upstream_backend;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
              proxy_redirect off;
          }

          location /admin/ {
              proxy_pass $$upstream_backend;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
              proxy_redirect off;
          }

          location /static/ {
              proxy_pass $$upstream_backend;
          }

          location / {
              proxy_pass $$upstream_frontend;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;
              proxy_redirect off;
          }
      }

secrets:
  django_secret_key:
    file: ${DJANGO_SECRET_KEY_FILE}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE}
  email_host_password:
    file: ${EMAIL_HOST_PASSWORD_FILE}

networks:
  app:
    name: zdravy_staging_app
