services:
  backend:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      STAGING_HOST: ${STAGING_HOST:?Set STAGING_HOST in Dokploy env}
      FRONTEND_URL: https://${STAGING_HOST:?Set STAGING_HOST in Dokploy env}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?Set EMAIL_HOST_PASSWORD in Dokploy env}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.zdravy-staging-backend.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/api/`) || PathPrefix(`/admin/`))"
      - traefik.http.routers.zdravy-staging-backend.entrypoints=web
      - traefik.http.routers.zdravy-staging-backend.priority=10
      - traefik.http.routers.zdravy-staging-backend.middlewares=zdravy-staging-gzip,zdravy-staging-bodylimit
      - traefik.http.services.zdravy-staging-backend.loadbalancer.server.port=8000
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.path=/api/health/
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.timeout=3s
      - "traefik.http.routers.zdravy-staging-static.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/static/`) || PathPrefix(`/media/`))"
      - traefik.http.routers.zdravy-staging-static.entrypoints=web
      - traefik.http.routers.zdravy-staging-static.priority=20
      - traefik.http.routers.zdravy-staging-static.service=zdravy-staging-backend
      - traefik.http.routers.zdravy-staging-static.middlewares=zdravy-staging-gzip,zdravy-staging-static-cache
      - traefik.http.middlewares.zdravy-staging-static-cache.headers.customResponseHeaders.Cache-Control=public, max-age=31536000, immutable
      - traefik.http.middlewares.zdravy-staging-gzip.compress=true
      - traefik.http.middlewares.zdravy-staging-bodylimit.buffering.maxRequestBodyBytes=104857600
      - logging.job=backend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - logging.job=redis

  celery:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    command: >
      sh -c "until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null;
             do echo 'Waiting for Redis...'; sleep 2; done &&
             celery -A app worker -l info"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?Set EMAIL_HOST_PASSWORD in Dokploy env}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      disable: true
    labels:
      - logging.job=celery

  celery-beat:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    command: >
      sh -c "until python -c \"import redis; redis.Redis(host='redis',port=6379).ping()\" 2>/dev/null;
             do echo 'Waiting for Redis...'; sleep 2; done &&
             celery -A app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      disable: true
    labels:
      - logging.job=celery-beat

  frontend:
    image: ${REGISTRY_USERNAME}/zdravy-projekt-frontend:${FRONTEND_IMAGE_TAG:-staging}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.zdravy-staging-frontend.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`)"
      - traefik.http.routers.zdravy-staging-frontend.entrypoints=web
      - traefik.http.routers.zdravy-staging-frontend.priority=1
      - traefik.http.routers.zdravy-staging-frontend.middlewares=zdravy-staging-gzip,zdravy-staging-bodylimit
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.server.port=80
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.timeout=3s
      - logging.job=frontend
    networks:
      - app
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - app
    restart: unless-stopped
    labels:
      - logging.job=prometheus

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - app
    restart: unless-stopped
    labels:
      - logging.job=loki

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/tmp
    networks:
      - app
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  loki_data:
  promtail_positions:

networks:
  app:
  dokploy-network:
    external: true
