# Gzip Compression
gzip on;
gzip_disable "msie6";
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 256;

server {
    listen 80;
    server_name zp.tomag.xyz;

    # Use Docker's internal DNS resolver; TTL=5s forces periodic re-resolution
    # so nginx doesn't cache stale IPs when containers are restarted.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Cloudflare real IP
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    # Variables force nginx to use the resolver on every request cycle
    # instead of caching IPs only at startup.
    set $upstream_backend "http://backend:8000";
    set $upstream_frontend "http://frontend:80";

    # Backend API
    location /api/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django admin
    location /admin/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django static files
    location /static/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Frontend application
    location / {
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
