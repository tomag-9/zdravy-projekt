[pytest]
DJANGO_SETTINGS_MODULE = app.settings.dev
python_files = tests.py test_*.py *_tests.py

# Keep legacy tests while introducing structured API test layers.
testpaths =
    tests
    api/tests

markers =
    unit: Fast isolated tests for services, serializers, and utilities.
    integration: API/database integration tests.
    e2e: End-to-end user workflow tests.

addopts =
    --reuse-db
    --nomigrations
    --cov=api
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=60
