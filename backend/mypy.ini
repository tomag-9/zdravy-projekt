[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = False
warn_no_return = True
disallow_incomplete_defs = False
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = True
no_implicit_optional = True
warn_incomplete_stub = True
disable_error_code = no-any-return

[mypy-api.tests.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-*.migrations.*]
ignore_errors = True

[mypy-api.views_backup]
ignore_errors = True

[mypy-api.admin]
ignore_errors = True

[mypy-api.services.report_service]
ignore_errors = True

[mypy-api.views.report_views]
ignore_errors = True

[mypy-api.views.report_xlsx_helpers]
ignore_errors = True

[mypy-api.exporters.*]
ignore_errors = True

[mypy-api.management.*]
ignore_errors = True

[mypy-celery]
ignore_missing_imports = True

[mypy-factory]
ignore_missing_imports = True

[mypy-rest_framework.*]
ignore_missing_imports = True

[mypy-psycopg2]
ignore_missing_imports = True
