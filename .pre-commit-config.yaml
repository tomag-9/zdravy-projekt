repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: black (backend)
        files: ^backend/
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (backend)
        files: ^backend/
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (backend)
        files: ^backend/
        args: ["--config=backend/.flake8"]

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend)
        entry: bash -c 'cd backend && if [ -x ./.venv/bin/mypy ]; then ./.venv/bin/mypy api --ignore-missing-imports --config-file=mypy.ini; else mypy api --ignore-missing-imports --config-file=mypy.ini; fi'
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: backend-pytest-coverage
        name: backend pytest coverage >= 60%
        entry: bash -c 'cd backend && if [ -x ./.venv/bin/python ]; then ./.venv/bin/python -m pytest --cov=api --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=html --cov-fail-under=60; else python3 -m pytest --cov=api --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=html --cov-fail-under=60; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
