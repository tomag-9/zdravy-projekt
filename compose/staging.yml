services:
  backend:
    image: ${REGISTRY_USERNAME:?Set REGISTRY_USERNAME in Dokploy env}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in Dokploy env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in Dokploy env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      STAGING_HOST: ${STAGING_HOST:?Set STAGING_HOST in Dokploy env}
      FRONTEND_URL: https://${STAGING_HOST:?Set STAGING_HOST in Dokploy env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in Dokploy env}
      EMAIL_HOST: ${EMAIL_HOST:?Set EMAIL_HOST in Dokploy env}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?Set EMAIL_HOST_PASSWORD in Dokploy env}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-}
    labels:
      - traefik.enable=true
      # Shared redirect middleware: HTTP -> HTTPS
      - "traefik.http.middlewares.zdravy-staging-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.zdravy-staging-https-redirect.redirectscheme.permanent=true"
      # Backend: HTTP router (redirect only)
      - "traefik.http.routers.zdravy-staging-backend.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/api/`) && !PathPrefix(`/api/deploy/compose/`))"
      - traefik.http.routers.zdravy-staging-backend.entrypoints=web
      # Backend: HTTPS router
      - "traefik.http.routers.zdravy-staging-backend-secure.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/api/`) && !PathPrefix(`/api/deploy/compose/`))"
      - traefik.http.routers.zdravy-staging-backend-secure.entrypoints=websecure
      - traefik.http.routers.zdravy-staging-backend-secure.tls=true
      - traefik.http.routers.zdravy-staging-backend-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.zdravy-staging-backend-secure.priority=10
      - traefik.http.routers.zdravy-staging-backend-secure.middlewares=zdravy-staging-gzip,zdravy-staging-bodylimit
      - traefik.http.routers.zdravy-staging-backend-secure.service=zdravy-staging-backend
      - traefik.http.services.zdravy-staging-backend.loadbalancer.server.port=8000
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.path=/api/health/
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.hostname=backend
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.zdravy-staging-backend.loadbalancer.healthcheck.timeout=3s
      # Static files: HTTP router (redirect only)
      - "traefik.http.routers.zdravy-staging-static.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/static/`) || PathPrefix(`/media/`))"
      - traefik.http.routers.zdravy-staging-static.entrypoints=web
      # Static files: HTTPS router
      - "traefik.http.routers.zdravy-staging-static-secure.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && (PathPrefix(`/static/`) || PathPrefix(`/media/`))"
      - traefik.http.routers.zdravy-staging-static-secure.entrypoints=websecure
      - traefik.http.routers.zdravy-staging-static-secure.tls=true
      - traefik.http.routers.zdravy-staging-static-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.zdravy-staging-static-secure.priority=20
      - traefik.http.routers.zdravy-staging-static-secure.service=zdravy-staging-backend
      - traefik.http.routers.zdravy-staging-static-secure.middlewares=zdravy-staging-gzip,zdravy-staging-static-cache
      - traefik.http.middlewares.zdravy-staging-static-cache.headers.customResponseHeaders.Cache-Control=public, max-age=31536000, immutable
      - traefik.http.middlewares.zdravy-staging-gzip.compress=true
      - traefik.http.middlewares.zdravy-staging-bodylimit.buffering.maxRequestBodyBytes=104857600
      - logging.job=backend
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics/
      - prometheus.io/port=8000
    networks:
      app:
      dokploy-network:
        # Stable, hyphen-only DNS alias for Alloy to scrape /metrics/ over.
        # Django's Host-header validation rejects the Swarm-assigned service
        # name (it contains underscores, which fail RFC 1034/1035 validation),
        # so Alloy must target this alias instead of the raw service name.
        aliases:
          - zdravy-staging-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-1.00}"
          memory: ${BACKEND_MEMORY_LIMIT:-768M}
        reservations:
          cpus: "${BACKEND_CPU_RESERVATION:-0.25}"
          memory: ${BACKEND_MEMORY_RESERVATION:-256M}

  celery:
    image: ${REGISTRY_USERNAME:?Set REGISTRY_USERNAME in Dokploy env}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    command: >
      sh -c "until python -c \"import os, redis; redis.from_url(os.environ['REDIS_URL']).ping()\" 2>/dev/null;
             do echo 'Waiting for Redis...'; sleep 2; done &&
             celery -A app worker -l info"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in Dokploy env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in Dokploy env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in Dokploy env}
      EMAIL_HOST: ${EMAIL_HOST:?Set EMAIL_HOST in Dokploy env}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?Set EMAIL_HOST_PASSWORD in Dokploy env}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-}
    networks:
      - app
      - dokploy-network
    healthcheck:
      disable: true
    labels:
      - logging.job=celery
    deploy:
      replicas: ${CELERY_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${CELERY_CPU_LIMIT:-1.00}"
          memory: ${CELERY_MEMORY_LIMIT:-768M}
        reservations:
          cpus: "${CELERY_CPU_RESERVATION:-0.25}"
          memory: ${CELERY_MEMORY_RESERVATION:-256M}

  celery-beat:
    image: ${REGISTRY_USERNAME:?Set REGISTRY_USERNAME in Dokploy env}/zdravy-projekt-backend:${BACKEND_IMAGE_TAG:-staging}
    command: >
      sh -c "until python -c \"import os, redis; redis.from_url(os.environ['REDIS_URL']).ping()\" 2>/dev/null;
             do echo 'Waiting for Redis...'; sleep 2; done &&
             celery -A app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.staging
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Dokploy env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in Dokploy env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in Dokploy env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in Dokploy env}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in Dokploy env}
      SENTRY_DSN: ${SENTRY_DSN:-}
    networks:
      - app
      - dokploy-network
    healthcheck:
      disable: true
    labels:
      - logging.job=celery-beat
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${CELERY_BEAT_CPU_LIMIT:-0.25}"
          memory: ${CELERY_BEAT_MEMORY_LIMIT:-256M}
        reservations:
          cpus: "${CELERY_BEAT_CPU_RESERVATION:-0.05}"
          memory: ${CELERY_BEAT_MEMORY_RESERVATION:-128M}

  frontend:
    image: ${REGISTRY_USERNAME:?Set REGISTRY_USERNAME in Dokploy env}/zdravy-projekt-frontend:${FRONTEND_IMAGE_TAG:-staging}
    labels:
      - traefik.enable=true
      # Frontend: HTTP router (redirect only)
      - "traefik.http.routers.zdravy-staging-frontend.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && !PathPrefix(`/api/deploy/compose/`)"
      - traefik.http.routers.zdravy-staging-frontend.entrypoints=web
      # Frontend: HTTPS router
      - "traefik.http.routers.zdravy-staging-frontend-secure.rule=Host(`${STAGING_HOST:?Set STAGING_HOST in Dokploy env}`) && !PathPrefix(`/api/deploy/compose/`)"
      - traefik.http.routers.zdravy-staging-frontend-secure.entrypoints=websecure
      - traefik.http.routers.zdravy-staging-frontend-secure.tls=true
      - traefik.http.routers.zdravy-staging-frontend-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.zdravy-staging-frontend-secure.priority=1
      - traefik.http.routers.zdravy-staging-frontend-secure.middlewares=zdravy-staging-gzip,zdravy-staging-bodylimit
      - traefik.http.routers.zdravy-staging-frontend-secure.service=zdravy-staging-frontend
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.server.port=80
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.zdravy-staging-frontend.loadbalancer.healthcheck.timeout=3s
      - logging.job=frontend
    networks:
      - app
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      replicas: ${FRONTEND_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.50}"
          memory: ${FRONTEND_MEMORY_LIMIT:-256M}
        reservations:
          cpus: "${FRONTEND_CPU_RESERVATION:-0.10}"
          memory: ${FRONTEND_MEMORY_RESERVATION:-64M}

networks:
  app:
  dokploy-network:
    external: true
